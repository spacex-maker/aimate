[build]
  base     = "frontend"
  command  = "npm run build"
  publish  = "dist"

[build.environment]
  NODE_VERSION = "20"

# 先匹配 /api，再匹配 /ws，最后才是 SPA fallback
[[redirects]]
  from = "/api/*"
  to   = "http://175.27.255.29:9299/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/ws"
  to   = "http://175.27.255.29:9299/ws"
  status = 200
  force = true

# SPA：所有路径回退到 index.html，由 React Router 处理
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
