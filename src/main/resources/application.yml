# 公共配置，本地与产线共用。具体环境由 application-{profile}.yml 提供。
# 未指定 profile 时默认 local；产线部署时设置 SPRING_PROFILES_ACTIVE=prod
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: aimate

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  threads:
    virtual:
      enabled: true
  task:
    execution:
      pool:
        core-size: 1

server:
  port: 9299

resilience4j:
  circuitbreaker:
    instances:
      primaryLlm:
        register-health-indicator: true
      fallbackLlm:
        register-health-indicator: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,retries
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    expiration-ms: 86400000
