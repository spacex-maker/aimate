# 产线环境。MySQL / Milvus / 向量服务与应用同机时使用 127.0.0.1。
# 激活方式：SPRING_PROFILES_ACTIVE=prod（部署时设置）
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:aimate}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2
      connection-timeout: 30000
      max-lifetime: 600000
      idle-timeout: 300000
  jpa:
    show-sql: false

agent:
  llm:
    primary:
      name: gpt-4o
      base-url: ${PRIMARY_LLM_BASE_URL}
      api-key: ${PRIMARY_LLM_API_KEY}
      model: ${PRIMARY_LLM_MODEL:gpt-4o}
      timeout-seconds: 120
    fallback:
      name: deepseek-chat
      base-url: ${FALLBACK_LLM_BASE_URL:https://api.deepseek.com/v1}
      api-key: ${FALLBACK_LLM_API_KEY}
      model: ${FALLBACK_LLM_MODEL:deepseek-chat}
      timeout-seconds: 120
  embedding:
    base-url: ${EMBEDDING_BASE_URL:http://127.0.0.1:11434/v1}
    api-key: ${EMBEDDING_API_KEY:ollama}
    model: ${EMBEDDING_MODEL:bge-m3}
    dimensions: ${EMBEDDING_DIMENSIONS:1024}
    timeout-seconds: 30
  script:
    docker:
      enabled: true
      idle-minutes: 30
      image: debian:bookworm-slim
      memory-limit: 4g
      cpu-limit: 2
      read-only-rootfs: false
      run-container-cmd-timeout-seconds: 300
      run-container-cmd-idle-timeout-seconds: 90
      script-timeout-seconds: 300
      script-idle-timeout-seconds: 90
  milvus:
    enabled: true
    host: ${MILVUS_HOST:127.0.0.1}
    port: ${MILVUS_PORT:19530}
    collection-name: agent_memories_v2
    vector-dimensions: ${MILVUS_VECTOR_DIMENSIONS:1024}

# 产线必须通过环境变量设置 JWT 密钥
app:
  jwt:
    secret: ${JWT_SECRET}

logging:
  level:
    com.openforge.aimate: INFO
    org.hibernate.SQL: WARN
