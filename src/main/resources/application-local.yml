# 本地开发环境。激活方式：-Dspring.profiles.active=local 或 SPRING_PROFILES_ACTIVE=local
spring:
  datasource:
    url: jdbc:mysql://170.106.105.131:3306/aimate?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: admin
    password: xp43520!@#
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2
      connection-timeout: 30000
      max-lifetime: 600000
      idle-timeout: 300000

agent:
  llm:
    primary:
      name: gpt-4o
      base-url: https://api.openai.com/v1
      api-key: ${PRIMARY_LLM_API_KEY:sk-placeholder}
      model: gpt-4o
      timeout-seconds: 120
    fallback:
      name: deepseek-chat
      base-url: https://api.deepseek.com/v1
      api-key: ${FALLBACK_LLM_API_KEY:sk-placeholder}
      model: deepseek-chat
      timeout-seconds: 120
  embedding:
    base-url: ${EMBEDDING_BASE_URL:http://127.0.0.1:11434/v1}
    api-key: ${EMBEDDING_API_KEY:ollama}
    model: ${EMBEDDING_MODEL:bge-m3}
    dimensions: ${EMBEDDING_DIMENSIONS:1024}
    timeout-seconds: 30
  script:
    docker:
      enabled: true
      idle-minutes: 30
      image: debian:bookworm-slim
      memory-limit: 4g
      cpu-limit: 2
      read-only-rootfs: false
      run-container-cmd-timeout-seconds: 300
      run-container-cmd-idle-timeout-seconds: 90
      script-timeout-seconds: 300
      script-idle-timeout-seconds: 90
  milvus:
    enabled: true
    host: ${MILVUS_HOST:127.0.0.1}
    port: ${MILVUS_PORT:19530}
    collection-name: agent_memories_v2
    vector-dimensions: ${MILVUS_VECTOR_DIMENSIONS:1024}

app:
  jwt:
    secret: ${JWT_SECRET:OpenForgeX-super-secret-key-change-me-in-prod-2026}

logging:
  level:
    com.openforge.aimate: DEBUG
    org.hibernate.SQL: WARN
